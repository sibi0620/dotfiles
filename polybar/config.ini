[colors]
# Nordic Color Scheme
nordBlack0 = #191D24
nordBlack1 = #1E222A
nordBlack2 = #222630
nord0 = #2e3440
nord1 = #3b4252
nord2 = #434c5e
nord3 = #4c566a
nord4 = #d8dee9
nord5 = #e5e9f0
nord6 = #eceff4
nord7 = #8fbcbb
nord8 = #88c0d0
nord9 = #81a1c1
nord10 = #5e81ac
nord11 = #bf616a
nord12 = #d08770
nord13 = #ebcb8b
nord14 = #a3be8c
nord15 = #b48ead
background = ${colors.nordBlack0}
background-alt = ${colors.nord10}
foreground = ${colors.nord4}
primary = ${colors.nord15}
secondary = ${colors.nord1}
alert = ${colors.nord11}
disabled = ${colors.nord3}



[bar/main]
width = 100%
height = 20pt
radius = 10

bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt


padding-left = 0
padding-right = 0

module-margin = 0

separator =
separator-foreground = ${colors.disabled}

# Replace your old font-0 with this:
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=10;2"
font-2 = "Font Awesome 6 Free:style=Solid:size=10;2"
font-3 = "icomoon:style=Regular"
font-4 = octicons:style=Medium

modules-left = xworkspaces 
modules-center = date
modules-right =  separator memory separator cpu separator battery separator pulseaudio separator

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/separator]
type = custom/text
format = <label>
format-foreground = ${colors.disabled}
format-padding = 1
label = |


[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.nord9}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔąÄ "
format-prefix-foreground = ${colors.nord9}
label = %percentage_used:2%%


[module/battery]
type = internal/battery
format-prefix = "ÔČÄ "
format-full-prefix = "ÔČÄ "
format-full-prefix-foreground = ${colors.nord9}
format-prefix-foreground = ${colors.primary}
full-at = 80
format-charging = <animation-charging> <label-charging>
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
; framerate in milliseconds
animation-charging-framerate = 750
animation-charging-foreground = ${colors.nord12}
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
low-at = 5
battery = BAT1
adapter = acad
poll-interval = 5


[module/xworkspaces]
type = internal/xworkspaces

icon-0 = 1;ÔĄ†
icon-1 = 2;ÔČ®
icon-2 = 3;ůĪ©Ĺ
icon-3 = 4;Ôāě
icon-4 = 5;ÔĀ≥
icon-5 = 6;ÔÄ•
icon-6 = 7;ÔÄĹ
icon-default = Ôčź

;
label-focused = %icon%
label-unfocused = %icon%
label-visible= %icon%

label-active = %icon%
label-occupied = %icon%
label-urgent = %icon%
label-empty = %icon%

label-monitor = %icon%

; Active workspace
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding-left = 1
label-active-padding-right = 1

; Occupied workspace
label-occupied-padding-left = 1
label-occupied-padding-right = 1

; Urgent workspace
label-urgent-background = ${colors.alert}
label-urgent-padding-left = 1
label-urgent-padding-right = 1

; Empty workspace
label-empty-foreground = ${colors.disabled}
label-empty-padding-left = 1
label-empty-padding-right = 1

; Overall module settings
format = <label-state>
format-padding = 0



[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
format-padding = 1
format-underline-size = 0.5
format-overline-size = 0.5


[module/pulseaudio]
type = internal/pulseaudio
format-name = volume

format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${colors.nord9}
label-volume = %percentage%%
label-muted = "ÔÄ¶ 0%"
label-muted-foreground = ${colors.disabled}
format-volume-padding = 1
format-muted-padding = 1

[module/date]
type = internal/date
interval = 1
format-prefix = "ÔÄó "
format-prefix-foreground = ${colors.nord9}
date = "%I:%M %p"
date-alt = %m.%d.%Y %I:%M:%S %p
label = %date%
format-padding = 1


[module/tray]
type = internal/tray
format-padding = 1
tray-spacing = 10px
tray-foreground = ${colors.primary}


[settings]
screenchange-reload = true
; pseudo-transparency = false

